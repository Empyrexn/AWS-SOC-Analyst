# Cortex service tweaks — apply in ~/thehive-stack/prod1-cortex/docker-compose.yml
# Then: cd ~/thehive-stack/prod1-cortex && sudo docker compose up -d cortex
# See docs/06-thehive-cortex.md

services:
  cortex:
    # 1) Publish 9001 so TheHive can reach Cortex by HOST IP (avoids the Docker
    #    network `elasticsearch` alias collision that caused TheHive's 401-at-boot).
    ports:
      - "9001:9001"

    # 2) The prod1-cortex profile already provides these; shown for reference.
    #    docker_job_directory MUST be the ABSOLUTE host path (not a relative one),
    #    and the host job dir needs permissive perms or analyzer containers hit
    #    java.nio.file.AccessDeniedException on /tmp/cortex-jobs:
    #       sudo chmod -R 1777 ~/thehive-stack/prod1-cortex/cortex/cortex-jobs
    environment:
      - docker_job_directory=/home/ubuntu/thehive-stack/prod1-cortex/cortex/cortex-jobs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./cortex/cortex-jobs:/tmp/cortex-jobs
